<svg viewBox="0 0 1500 900" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'JetBrains Mono', monospace">
  <defs>
    <marker id="arrowHeat" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#CC5522"/>
    </marker>
    <marker id="arrowSignal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#666666"/>
    </marker>
    <marker id="arrowFeedback" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8855AA"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="900" fill="#FFFFFF"/>
  <text x="30" y="35" font-size="20" font-weight="bold" fill="#111111">Reactor Core — detail schematic</text>
  <text x="30" y="55" font-size="12" fill="#555555">Zoom into the REACTOR CORE block of the overview schematic. Grounded in the reference plant: one core zone ("zone"), one fuel channel group ("group").</text>
  <text x="30" y="70" font-size="11" fill="#8855AA">Purple = reactivity feedback (point kinetics is global — one value for the whole core, not per-zone, even with a single zone here)</text>

  <!-- ===================== CORE ZONE / CHANNEL GROUP ===================== -->
  <rect x="60" y="120" width="420" height="420" rx="6" fill="#FAFAFA" stroke="#111111" stroke-width="2"/>
  <text x="80" y="145" font-size="13" font-weight="bold">CORE ZONE "zone"</text>
  <text x="80" y="160" font-size="9" fill="#777777">configurable count — this reference plant uses exactly one</text>

  <rect x="90" y="180" width="360" height="330" rx="4" fill="#F0F0F0" stroke="#333333" stroke-width="1.5"/>
  <text x="270" y="200" font-size="12" font-weight="bold" text-anchor="middle">FUEL CHANNEL GROUP "group"</text>
  <text x="270" y="214" font-size="9" fill="#777777" text-anchor="middle">equivalent group representing many physical channels</text>

  <!-- fuel / structure / coolant thermal nodes -->
  <rect x="115" y="235" width="90" height="55" fill="#FFFFFF" stroke="#111111"/>
  <text x="160" y="258" font-size="10" text-anchor="middle" font-weight="bold">FUEL</text>
  <text x="160" y="272" font-size="9" text-anchor="middle" fill="#555555">thermal body</text>

  <rect x="225" y="235" width="90" height="55" fill="#FFFFFF" stroke="#111111"/>
  <text x="270" y="258" font-size="10" text-anchor="middle" font-weight="bold">STRUCTURE</text>
  <text x="270" y="272" font-size="9" text-anchor="middle" fill="#555555">thermal body</text>

  <rect x="335" y="235" width="90" height="55" fill="#FFFFFF" stroke="#111111"/>
  <text x="380" y="258" font-size="10" text-anchor="middle" font-weight="bold">COOLANT</text>
  <text x="380" y="272" font-size="9" text-anchor="middle" fill="#555555">channel flow</text>

  <text x="270" y="310" font-size="9" text-anchor="middle" fill="#CC5522">fission heat split: 70% fuel / 10% structure / 20% coolant</text>

  <!-- coolant in/out -->
  <path d="M90,340 L270,340 L270,290" fill="none" stroke="#2266CC" stroke-width="2.5"/>
  <text x="130" y="335" font-size="9" fill="#2266CC">coolant in (from MCP)</text>
  <path d="M380,290 L380,340 L450,340" fill="none" stroke="#CC5522" stroke-width="2.5"/>
  <text x="400" y="335" font-size="9" fill="#CC5522">steam quality out (to drum)</text>

  <!-- void/quality diagnostics -->
  <rect x="115" y="360" width="310" height="60" fill="#FFFFFF" stroke="#999999" stroke-dasharray="3,2"/>
  <text x="270" y="378" font-size="9" text-anchor="middle" fill="#555555">diagnostics: phase / quality / void fraction / pressure drop</text>
  <text x="270" y="392" font-size="9" text-anchor="middle" fill="#555555">per-channel power &amp; flow, represented-channel count</text>
  <text x="270" y="406" font-size="9" text-anchor="middle" fill="#555555">(M3.4 committed-state outputs — read-only, no separate integrator)</text>

  <!-- ===================== REACTIVITY / POINT KINETICS ===================== -->
  <rect x="580" y="120" width="360" height="420" rx="6" fill="#FAFAFA" stroke="#111111" stroke-width="2"/>
  <text x="760" y="145" font-size="13" font-weight="bold" text-anchor="middle">POINT KINETICS (global, one value for the whole core)</text>

  <rect x="610" y="170" width="140" height="40" fill="#FFFFFF" stroke="#8855AA"/>
  <text x="680" y="194" font-size="10" text-anchor="middle">ROD GROUP(S)</text>

  <rect x="610" y="225" width="140" height="40" fill="#FFFFFF" stroke="#8855AA"/>
  <text x="680" y="249" font-size="10" text-anchor="middle">TEMPERATURE</text>

  <rect x="610" y="280" width="140" height="40" fill="#FFFFFF" stroke="#8855AA"/>
  <text x="680" y="304" font-size="10" text-anchor="middle">VOID FRACTION</text>

  <rect x="610" y="335" width="140" height="40" fill="#FFFFFF" stroke="#8855AA"/>
  <text x="680" y="359" font-size="10" text-anchor="middle">XENON / IODINE</text>

  <path d="M750,190 L800,190 L800,300" fill="none" stroke="#8855AA" stroke-width="2" marker-end="url(#arrowFeedback)"/>
  <path d="M750,245 L800,245 L800,300" fill="none" stroke="#8855AA" stroke-width="2" marker-end="url(#arrowFeedback)"/>
  <path d="M750,300 L800,300" fill="none" stroke="#8855AA" stroke-width="2" marker-end="url(#arrowFeedback)"/>
  <path d="M750,355 L800,355 L800,300" fill="none" stroke="#8855AA" stroke-width="2" marker-end="url(#arrowFeedback)"/>

  <rect x="800" y="270" width="120" height="60" fill="#F0EAF5" stroke="#8855AA" stroke-width="2"/>
  <text x="860" y="294" font-size="10" text-anchor="middle" font-weight="bold">REACTIVITY</text>
  <text x="860" y="308" font-size="10" text-anchor="middle" font-weight="bold">(named terms sum)</text>
  <text x="860" y="322" font-size="8" fill="#666666" text-anchor="middle">M2.1 composition</text>

  <path d="M920,300 L930,300" fill="none" stroke="#8855AA" stroke-width="2" marker-end="url(#arrowFeedback)"/>
  <rect x="815" y="400" width="90" height="40" fill="#FFFFFF" stroke="#111111"/>
  <text x="860" y="424" font-size="10" text-anchor="middle">NEUTRON</text>
  <path d="M860,330 L860,400" fill="none" stroke="#8855AA" stroke-width="2" marker-end="url(#arrowFeedback)"/>

  <rect x="800" y="470" width="120" height="45" fill="#FFF3EA" stroke="#CC5522" stroke-width="2"/>
  <text x="860" y="490" font-size="10" text-anchor="middle" font-weight="bold">FISSION POWER</text>
  <text x="860" y="503" font-size="8" fill="#666666" text-anchor="middle">calibrated to reference</text>
  <path d="M860,440 L860,470" fill="none" stroke="#111111" stroke-width="2"/>

  <!-- Fission power -> heat destination -> back into fuel channel group -->
  <path d="M800,492 L470,492 L470,262" fill="none" stroke="#CC5522" stroke-width="2.5" marker-end="url(#arrowHeat)"/>
  <text x="600" y="486" font-size="9" fill="#CC5522">heat source (100% to fuel, this plant)</text>

  <!-- ===================== CONTROL LOOPS ===================== -->
  <rect x="1020" y="120" width="420" height="200" rx="6" fill="#FAFAFA" stroke="#333333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1230" y="145" font-size="12" font-weight="bold" text-anchor="middle">REACTOR PRIMARY CONTROL LOOPS (M5.3)</text>

  <rect x="1045" y="170" width="180" height="55" fill="#FFFFFF" stroke="#666666"/>
  <text x="1135" y="192" font-size="10" text-anchor="middle" font-weight="bold">power-loop</text>
  <text x="1135" y="206" font-size="8" fill="#666666" text-anchor="middle">reactor power measurement</text>
  <text x="1135" y="218" font-size="8" fill="#666666" text-anchor="middle">→ rod-actuator</text>

  <rect x="1255" y="170" width="180" height="55" fill="#FFFFFF" stroke="#666666"/>
  <text x="1345" y="192" font-size="10" text-anchor="middle" font-weight="bold">flow-loop</text>
  <text x="1345" y="206" font-size="8" fill="#666666" text-anchor="middle">MCP flow measurement</text>
  <text x="1345" y="218" font-size="8" fill="#666666" text-anchor="middle">→ mcp-actuator</text>

  <text x="1230" y="250" font-size="9" fill="#555555" text-anchor="middle">both read from the shared MeasuredSignalFrame (M5.1),</text>
  <text x="1230" y="264" font-size="9" fill="#555555" text-anchor="middle">both can be overridden by SCRAM / rod-withdrawal interlocks (M5.5)</text>

  <path d="M905,190 L1045,197" fill="none" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowSignal)" stroke-dasharray="4,2"/>
  <path d="M905,410 L1045,197" fill="none" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowSignal)" stroke-dasharray="4,2"/>

  <text x="30" y="870" font-size="10" fill="#777777">Original diagram — component/instance names ("zone", "group") match ColdShutdownInitialConditionFactory.cs. Rod-group count is illustrative.</text>
</svg>
